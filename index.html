<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sites Preferidos Helenio</title>
    <link rel="icon" href="https://i.ibb.co/p6j8M5Yh/icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F5E7B2;
            --gold-dark: #B8960C;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --bg-main: #0f0f1a;
            --bg-card: rgba(30, 30, 50, 0.85);
            --bg-card-hover: rgba(40, 40, 65, 0.9);
            --bg-input: rgba(255, 255, 255, 0.05);
            --success: #2ecc71;
            --success-hover: #27ae60;
            --danger: #e74c3c;
            --danger-hover: #c0392b;
            --primary: #7b8fa1;
            --border: rgba(212, 175, 55, 0.2);
            --text-main: #e8e6e3;
            --text-muted: #a0a0b0;
            --text-dim: #6b6b7b;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --shadow-gold: 0 0 20px rgba(212, 175, 55, 0.15);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: var(--text-main);
            padding: 20px 12px;
            position: relative;
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            50% { transform: translateY(-10vh) rotate(180deg); }
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }
        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 12px;
        }
        .profile-img {
            width: 90px; height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3), 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .profile-wrapper:hover .profile-img {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.5), 0 6px 20px rgba(0,0,0,0.4);
        }
        .profile-ring {
            position: absolute;
            top: -6px; left: -6px;
            width: 102px; height: 102px;
            border: 2px solid transparent;
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        h1 {
            font-family: 'Great Vibes', cursive;
            color: var(--gold);
            font-size: 2.2rem;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
            letter-spacing: 1px;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 2px;
            font-weight: 300;
        }

        .container {
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .form-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
        }
        .form-title {
            font-size: 0.9rem;
            color: var(--gold);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }
        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .input-wrapper {
            flex: 1;
            min-width: 140px;
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 0.85rem;
        }
        .input-group input {
            width: 100%;
            padding: 10px 12px 10px 34px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            background: var(--bg-input);
            color: var(--text-main);
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-glow);
            background: rgba(255,255,255,0.08);
        }
        .input-group input::placeholder { color: var(--text-dim); }

        .btn-primary {
            padding: 10px 24px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: #0f0f1a;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }
        .btn-primary:active { transform: translateY(0); }

        .links-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }
        .links-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }
        .links-title {
            font-size: 0.9rem;
            color: var(--gold);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .links-list {
            list-style: none;
            max-height: 55vh;
            overflow-y: auto;
            padding-right: 4px;
        }
        .links-list::-webkit-scrollbar { width: 4px; }
        .links-list::-webkit-scrollbar-track { background: transparent; }
        .links-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .links-list::-webkit-scrollbar-thumb:hover { background: var(--gold); }

        .link-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }
        .link-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--gold);
            border-radius: 0 3px 3px 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .link-item:hover {
            background: var(--bg-card-hover);
            border-color: rgba(212, 175, 55, 0.15);
            transform: translateX(4px);
        }
        .link-item:hover::before { opacity: 1; }

        .link-favicon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(212, 175, 55, 0.05) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .link-favicon i {
            color: var(--gold);
            font-size: 0.9rem;
        }
        .link-favicon img {
            width: 20px; height: 20px;
            border-radius: 4px;
        }

        .link-info {
            flex: 1;
            min-width: 0;
        }
        .link-name {
            color: var(--text-main);
            font-size: 0.92rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .link-url {
            color: var(--text-dim);
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .link-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .link-item:hover .link-actions { opacity: 1; }
        .btn-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 0.85rem;
        }
        .btn-icon:hover {
            background: rgba(255,255,255,0.08);
            color: var(--gold);
        }
        .btn-icon.delete:hover {
            background: rgba(231, 76, 60, 0.15);
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
        }
        .empty-state i {
            font-size: 2.5rem;
            color: var(--border);
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: 0.9rem;
        }

        .backup-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
        }
        .backup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .backup-title {
            font-size: 0.9rem;
            color: var(--gold);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .backup-status {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(46, 204, 113, 0.1);
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .backup-status.offline {
            background: rgba(231, 76, 60, 0.1);
            color: var(--danger);
        }

        .backup-input-group {
            position: relative;
            margin-bottom: 12px;
        }
        .backup-input-group textarea {
            width: 100%;
            height: 50px;
            padding: 10px 40px 10px 12px;
            font-size: 0.8rem;
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            color: var(--text-main);
            resize: none;
            font-family: 'Inter', monospace;
            transition: all 0.3s ease;
        }
        .backup-input-group textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }
        .backup-input-group .copy-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px; height: 28px;
            border-radius: 6px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .backup-input-group .copy-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            color: var(--gold);
        }

        .backup-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-action {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            border: 1px solid var(--border);
            cursor: pointer;
            background: var(--bg-input);
            color: var(--text-muted);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }
        .btn-action:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 175, 55, 0.08);
        }
        .btn-action.primary {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: #0f0f1a;
            border: none;
            font-weight: 600;
        }
        .btn-action.primary:hover {
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            transform: translateY(-1px);
        }
        .btn-action.danger {
            border-color: rgba(231, 76, 60, 0.3);
            color: var(--danger);
        }
        .btn-action.danger:hover {
            background: rgba(231, 76, 60, 0.1);
            border-color: var(--danger);
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
            max-width: 320px;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(20px); }
        }
        .toast i { font-size: 1rem; }
        .toast.success i { color: var(--success); }
        .toast.error i { color: var(--danger); }
        .toast.info i { color: var(--gold); }
        .toast-text { font-size: 0.85rem; color: var(--text-main); }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 360px;
            width: 90%;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal-title {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 8px;
            font-weight: 600;
        }
        .modal-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            padding: 16px;
            color: var(--text-dim);
            font-size: 0.75rem;
        }
        .footer i { color: var(--danger); }

        @media (max-width: 480px) {
            h1 { font-size: 1.6rem; }
            .profile-img { width: 70px; height: 70px; }
            .profile-ring { width: 82px; height: 82px; top: -6px; left: -6px; }
            .input-group { flex-direction: column; }
            .input-wrapper { min-width: 100%; }
            .btn-primary { width: 100%; justify-content: center; }
            .link-actions { opacity: 1; }
            .backup-buttons { justify-content: center; }
            .backup-buttons .btn-action { flex: 1; justify-content: center; }
        }

        .fade-in {
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <div class="modal-title" id="modalTitle">Confirmar</div>
            <div class="modal-text" id="modalText">Tem certeza?</div>
            <div class="modal-buttons">
                <button class="btn-action" onclick="closeModal()">Cancelar</button>
                <button class="btn-action danger" id="modalConfirmBtn">Confirmar</button>
            </div>
        </div>
    </div>

    <header class="header fade-in">
        <div class="profile-wrapper">
            <div class="profile-ring"></div>
            <img src="https://i.ibb.co/n8Dvmqbr/photo-1738003366938-d5af91b55f36.jpg" alt="Foto de Helenio" class="profile-img">
        </div>
        <h1>Sites Preferidos Helenio</h1>
        <p class="subtitle">Seus links favoritos, sempre a mao</p>
    </header>

    <main class="container">
        <div class="form-card fade-in">
            <div class="form-title">
                <i class="fas fa-plus-circle"></i>
                <span id="formTitleText">Adicionar Novo Link</span>
            </div>
            <div class="input-group">
                <div class="input-wrapper">
                    <i class="fas fa-tag"></i>
                    <input type="text" id="siteName" placeholder="Nome do site" onkeypress="handleEnter(event)">
                </div>
                <div class="input-wrapper">
                    <i class="fas fa-link"></i>
                    <input type="text" id="siteUrl" placeholder="URL do site" onkeypress="handleEnter(event)">
                </div>
                <button onclick="saveLink()" class="btn-primary" id="saveBtn">
                    <i class="fas fa-save"></i>
                    <span id="saveBtnText">Salvar</span>
                </button>
                <button onclick="cancelEdit()" class="btn-action" id="cancelBtn" style="display:none;">
                    <i class="fas fa-times"></i>
                    Cancelar
                </button>
            </div>
        </div>

        <div class="links-container fade-in">
            <div class="links-header">
                <div class="links-title">
                    <i class="fas fa-bookmark"></i>
                    Meus Links
                </div>
            </div>
            <ul id="linksList" class="links-list"></ul>
        </div>

        <div class="backup-card fade-in">
            <div class="backup-header">
                <div class="backup-title">
                    <i class="fas fa-cloud"></i>
                    Backup e Restauracao
                </div>
                <span class="backup-status" id="backupStatus">
                    <i class="fas fa-check-circle"></i> Pronto
                </span>
            </div>
            <div class="backup-input-group">
                <textarea id="backupCode" placeholder="Cole o codigo de backup ou ID da nuvem aqui..."></textarea>
                <button class="copy-btn" onclick="copyBackupCode()" title="Copiar">
                    <i class="fas fa-copy"></i>
                </button>
            </div>
            <div class="backup-buttons">
                <button class="btn-action" onclick="generateBackup()">
                    <i class="fas fa-download"></i> Gerar Local
                </button>
                <button class="btn-action" onclick="restoreBackup()">
                    <i class="fas fa-upload"></i> Restaurar Local
                </button>
                <button class="btn-action primary" onclick="uploadToCloud()">
                    <i class="fas fa-cloud-upload-alt"></i> Enviar Nuvem
                </button>
                <button class="btn-action primary" onclick="downloadFromCloud()">
                    <i class="fas fa-cloud-download-alt"></i> Baixar Nuvem
                </button>
            </div>
        </div>
    </main>

    <footer class="footer fade-in">
        <p>Feito com <i class="fas fa-heart"></i> para Helenio</p>
    </footer>

    <script>
        let links = JSON.parse(localStorage.getItem('helenio_links')) || [];
        let editIndex = -1;

        const apiKey = "$2a$10$G4lyy9OHvSKE5WxTrKa5b.KjJR7MoSJOFXDDQYqRxfjgLOB4/BExe";
        const accessKey = "$2a$10$GH2GVM6At0oiDgHxdXyS4.v8BHoCW1HaSMcGz9PpzMxTW.WabnekK";
        const binStorageKey = "helenio_jsonbin_id";

        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            atualizarTudo();

            const inicialId = localStorage.getItem(binStorageKey);
            if (inicialId && isValidBinId(inicialId.trim())) {
                document.getElementById('backupCode').value = inicialId.trim();
            }
        });

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 15 + 's';
                p.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(p);
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
            toast.innerHTML = `
                <i class="fas ${icons[type] || icons.info}"></i>
                <span class="toast-text">${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        let modalCallback = null;
        function showModal(title, text, confirmText, callback) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').textContent = text;
            document.getElementById('modalConfirmBtn').textContent = confirmText;
            modalCallback = callback;
            document.getElementById('confirmModal').classList.add('active');
        }
        function closeModal() {
            document.getElementById('confirmModal').classList.remove('active');
            modalCallback = null;
        }
        document.getElementById('modalConfirmBtn').addEventListener('click', () => {
            if (modalCallback) modalCallback();
            closeModal();
        });
        document.getElementById('confirmModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('confirmModal')) closeModal();
        });

        function formatUrl(url) {
            url = url.trim();
            if (!url) return '';
            if (!url.startsWith('http')) url = 'https://' + url;
            const regex = /^(https?:\/\/)?([\w-]+\.)+[\w-]{2,}(\/.*)?$/;
            return regex.test(url) ? url : null;
        }

        function isValidBinId(id) {
            return /^[a-f0-9]{24}$/i.test(id);
        }

        function getDomain(url) {
            try {
                const u = new URL(url);
                return u.hostname.replace('www.', '');
            } catch {
                return url;
            }
        }

        function getFaviconUrl(url) {
            try {
                const domain = getDomain(url);
                return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
            } catch {
                return null;
            }
        }

        function ordenarLinks() {
            links.sort((a, b) => a.name.localeCompare(b.name, 'pt-BR', { sensitivity: 'base' }));
        }

        function renderLinks() {
            const list = document.getElementById('linksList');

            if (links.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-bookmark"></i>
                        <p>Nenhum link salvo ainda</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = '';
            links.forEach((link, index) => {
                const favicon = getFaviconUrl(link.url);
                const li = document.createElement('li');
                li.className = 'link-item';
                li.innerHTML = `
                    <div class="link-favicon">
                        ${favicon ? `<img src="${favicon}" alt="" onerror="this.parentElement.innerHTML='<i class=\'fas fa-globe\'></i>'">` : '<i class="fas fa-globe"></i>'}
                    </div>
                    <div class="link-info" onclick="openLink('${link.url}')">
                        <div class="link-name">${escapeHtml(link.name)}</div>
                        <div class="link-url">${escapeHtml(getDomain(link.url))}</div>
                    </div>
                    <div class="link-actions">
                        <button class="btn-icon" onclick="event.stopPropagation(); editarLink(${index})" title="Editar">
                            <i class="fas fa-pen"></i>
                        </button>
                        <button class="btn-icon delete" onclick="event.stopPropagation(); confirmDelete(${index})" title="Excluir">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function openLink(url) {
            window.open(url, '_blank');
        }

        function handleEnter(e) {
            if (e.key === 'Enter') saveLink();
        }

        function saveLink() {
            const nameInput = document.getElementById('siteName');
            const urlInput = document.getElementById('siteUrl');
            let name = nameInput.value.trim();
            let url = formatUrl(urlInput.value);

            if (!name || !url) {
                showToast('Preencha nome e URL validos!', 'error');
                return;
            }

            const duplicateIndex = links.findIndex((l, i) => 
                l.url === url && i !== editIndex
            );
            if (duplicateIndex !== -1) {
                showToast('Este link ja existe!', 'error');
                return;
            }

            const linkData = { name, url, timestamp: Date.now() };

            if (editIndex === -1) {
                links.push(linkData);
                showToast('Link adicionado com sucesso!');
            } else {
                links[editIndex] = { ...links[editIndex], ...linkData };
                showToast('Link atualizado com sucesso!');
            }

            editIndex = -1;
            resetForm();
            atualizarTudo();
        }

        function editarLink(index) {
            document.getElementById('siteName').value = links[index].name;
            document.getElementById('siteUrl').value = links[index].url;
            editIndex = index;
            document.getElementById('formTitleText').textContent = 'Editar Link';
            document.getElementById('saveBtnText').textContent = 'Atualizar';
            document.getElementById('cancelBtn').style.display = 'flex';
            document.getElementById('siteName').focus();
        }

        function cancelEdit() {
            editIndex = -1;
            resetForm();
        }

        function resetForm() {
            document.getElementById('siteName').value = '';
            document.getElementById('siteUrl').value = '';
            document.getElementById('formTitleText').textContent = 'Adicionar Novo Link';
            document.getElementById('saveBtnText').textContent = 'Salvar';
            document.getElementById('cancelBtn').style.display = 'none';
        }

        function confirmDelete(index) {
            showModal(
                'Excluir Link',
                `Tem certeza que deseja excluir "${links[index].name}"?`,
                'Excluir',
                () => { excluirLink(index); }
            );
        }

        function excluirLink(index) {
            links.splice(index, 1);
            atualizarTudo();
            showToast('Link excluido!');
        }

        function atualizarTudo() {
            ordenarLinks();
            localStorage.setItem('helenio_links', JSON.stringify(links));
            localStorage.setItem('helenio_last_save', new Date().toISOString());
            renderLinks();
        }

        function generateBackup() {
            if (links.length === 0) {
                showToast('Nao ha links para exportar', 'info');
                return;
            }
            const code = btoa(JSON.stringify(links));
            document.getElementById('backupCode').value = code;
            showToast('Codigo de backup gerado! Copie e guarde com seguranca.');
        }

        function restoreBackup() {
            const code = document.getElementById('backupCode').value.trim();
            if (!code) {
                showToast('Cole um codigo de backup primeiro!', 'error');
                return;
            }
            try {
                const restored = JSON.parse(atob(code));
                if (!Array.isArray(restored)) throw new Error('Formato invalido');

                showModal(
                    'Restaurar Backup',
                    `Restaurar ${restored.length} links? Os links atuais serao substituidos.`,
                    'Restaurar',
                    () => {
                        links = restored.map(l => ({ ...l, timestamp: l.timestamp || Date.now() }));
                        atualizarTudo();
                        showToast('Backup restaurado com sucesso!');
                    }
                );
            } catch (e) {
                showToast('Codigo de backup invalido!', 'error');
            }
        }

        function copyBackupCode() {
            const textarea = document.getElementById('backupCode');
            if (!textarea.value) {
                showToast('Nada para copiar', 'info');
                return;
            }
            textarea.select();
            document.execCommand('copy');
            showToast('Codigo copiado para a area de transferencia!');
        }

        async function uploadToCloud() {
            const backupStatus = document.getElementById('backupStatus');
            backupStatus.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
            backupStatus.className = 'backup-status';

            let binId = document.getElementById('backupCode').value.trim() || localStorage.getItem(binStorageKey) || "";
            binId = binId.trim();

            let url = "https://api.jsonbin.io/v3/b";
            let method = "POST";
            let headers = {
                "Content-Type": "application/json",
                "X-Master-Key": apiKey,
                "X-Access-Key": accessKey
            };

            if (isValidBinId(binId)) {
                url = `https://api.jsonbin.io/v3/b/${binId}`;
                method = "PUT";
            } else {
                headers["X-Bin-Name"] = "helenio_links_backup";
                headers["X-Bin-Private"] = "true";
            }

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: headers,
                    body: JSON.stringify(links)
                });
                const data = await response.json();

                if (response.ok) {
                    let savedBinId = method === "POST" ? data.metadata.id : binId;
                    localStorage.setItem(binStorageKey, savedBinId);
                    document.getElementById('backupCode').value = savedBinId;
                    backupStatus.innerHTML = '<i class="fas fa-check-circle"></i> Sincronizado';
                    backupStatus.className = 'backup-status';
                    showToast('Backup salvo na nuvem com sucesso!');
                } else {
                    backupStatus.innerHTML = '<i class="fas fa-times-circle"></i> Erro';
                    backupStatus.className = 'backup-status offline';
                    showToast('Erro da API: ' + (data.message || "Falha ao enviar"), 'error');
                }
            } catch (error) {
                backupStatus.innerHTML = '<i class="fas fa-times-circle"></i> Offline';
                backupStatus.className = 'backup-status offline';
                showToast('Erro de conexao com a nuvem.', 'error');
            }
        }

        async function downloadFromCloud() {
            const backupStatus = document.getElementById('backupStatus');
            backupStatus.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Baixando...';
            backupStatus.className = 'backup-status';

            let binId = document.getElementById('backupCode').value.trim() || localStorage.getItem(binStorageKey) || "";
            binId = binId.trim();

            if (!isValidBinId(binId)) {
                backupStatus.innerHTML = '<i class="fas fa-exclamation-circle"></i> ID Invalido';
                backupStatus.className = 'backup-status offline';
                showToast('Insira um ID de Bin valido (24 caracteres hexadecimais)', 'error');
                return;
            }

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
                    method: "GET",
                    headers: {
                        "X-Master-Key": apiKey,
                        "X-Access-Key": accessKey
                    }
                });
                const data = await response.json();

                if (response.ok) {
                    if (Array.isArray(data.record)) {
                        links = data.record.map(l => ({ ...l, timestamp: l.timestamp || Date.now() }));
                        atualizarTudo();
                        localStorage.setItem(binStorageKey, binId);
                        document.getElementById('backupCode').value = binId;
                        backupStatus.innerHTML = '<i class="fas fa-check-circle"></i> Sincronizado';
                        backupStatus.className = 'backup-status';
                        showToast('Backup sincronizado da nuvem!');
                    } else {
                        backupStatus.innerHTML = '<i class="fas fa-times-circle"></i> Erro';
                        backupStatus.className = 'backup-status offline';
                        showToast('Formato de dados invalido.', 'error');
                    }
                } else {
                    backupStatus.innerHTML = '<i class="fas fa-times-circle"></i> Erro';
                    backupStatus.className = 'backup-status offline';
                    showToast('Erro ao buscar dados: ' + (data.message || "ID incorreto."), 'error');
                }
            } catch (error) {
                backupStatus.innerHTML = '<i class="fas fa-times-circle"></i> Offline';
                backupStatus.className = 'backup-status offline';
                showToast('Erro de conexao ao baixar dados.', 'error');
            }
        }
    </script>
</body>
</html>
